<html lang="es">

    <style>
        :root {
            --portal-green: #00ff66;
            --portal-glow: rgba(0, 255, 102, 0.4);
            --cyan-tech: #00e5ff;
            --space-dark: #0a0c10;
            --panel-bg: rgba(20, 26, 35, 0.85);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--space-dark);
            /* Fondo sutil de estrellas */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Título Estilo Rick y Morty animado */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--cyan-tech);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6), 0 0 20px rgba(0, 229, 255, 0.3);
            animation: floating 3s ease-in-out infinite alternate;
        }

        h1 span {
            color: var(--portal-green);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.6), 0 0 20px rgba(0, 255, 102, 0.3);
        }

        /* Panel de Control Estilo Gadget Científico */
        .controls-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            background: var(--panel-bg);
            padding: 20px 40px;
            border-radius: 16px;
            border: 2px solid #1f2d3d;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .controls-container:hover {
            border-color: var(--cyan-tech);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--cyan-tech);
        }

        select {
            background: #11161e;
            color: #fff;
            border: 2px solid #2a3b50;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            outline: none;
            min-width: 160px;
            transition: all 0.2s ease;
        }

        select:focus, select:hover {
            border-color: var(--portal-green);
            box-shadow: 0 0 8px var(--portal-glow);
            background: #161d28;
        }

        /* Contenedor del video con el Brillo del Portal Interdimensional */
        .video-container {
            width: 100%;
            max-width: 850px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.8), 0 0 20px var(--portal-glow);
            aspect-ratio: 16 / 9;
            border: 3px solid var(--portal-green);
            animation: portalPulse 4s double infinite alternate;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Letrero de Estado tipo Computadora de Rick */
        .status-message {
            margin-top: 25px;
            font-family: 'Orbitron', sans-serif;
            color: #8fa3b9;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #1f2d3d;
            letter-spacing: 1px;
            text-align: center;
        }

        /* ANIMACIONES */
        @keyframes floating {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }

        @keyframes portalPulse {
            0% {
                border-color: var(--portal-green);
                box-shadow: 0 0 15px var(--portal-glow);
            }
            100% {
                border-color: #88ff00;
                box-shadow: 0 0 30px rgba(136, 255, 0, 0.6), inset 0 0 15px rgba(0,255,102,0.2);
            }
        }

        /* Diseño responsivo para pantallas pequeñas */
        @media(max-width: 600px) {
            .controls-container {
                flex-direction: column;
                padding: 20px;
                width: 80%;
            }
            select {
                width: 100%;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

        const statusMessage = document.getElementById('status');

        function inicializarWeb() {
            selectTemporada.innerHTML = "";
            Object.keys(enlacesEpisodios).forEach(temp => {
                let option = document.createElement('option');
                option.value = temp;
                option.textContent = `Dimensión ${temp}`;
                selectTemporada.appendChild(option);
            });
            cargarCapitulos();
        }

        function cargarCapitulos() {
            const tempSeleccionada = selectTemporada.value;
            selectCapitulo.innerHTML = "";
            
            if (enlacesEpisodios[tempSeleccionada]) {
                Object.keys(enlacesEpisodios[tempSeleccionada]).forEach(cap => {
                    let option = document.createElement('option');
                    option.value = cap;
                    option.textContent = `Realidad C-${cap}`;
                    selectCapitulo.appendChild(option);
                });
            }
            reproducirEpisodio();
        }

        function reproducirEpisodio() {
            const temp = selectTemporada.value;
            const cap = selectCapitulo.value;
            const videoUrl = enlacesEpisodios[temp][cap];

            if (!videoUrl || videoUrl.startsWith("TU_LINK_AQUI")) {
                statusMessage.innerHTML = `⚠️ <span style="color:#ff4444">ERROR INTERDIMENSIONAL:</span> La realidad C-${cap} aún no ha sido escaneada.`;
                video.pause();
                return;
            }

            statusMessage.innerHTML = ` Transmitiendo Dimensión ${temp} ──> Realidad C-${cap}`;

            if (hlsInstance) {
                hlsInstance.destroy();
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(videoUrl);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            } else {
                statusMessage.textContent = "Tu tecnología obsoleta no soporta flujos HLS (.m3u8).";
            }
        }

        window.onload = inicializarWeb;
